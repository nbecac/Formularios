<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Formularios AI Assistant</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
            background: #ffffff; 
            width: 300px; 
        }
        .btn-black { 
            background: #000000; 
            color: #ffffff; 
            border: none; 
            padding: 16px 24px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer;
            width: 100%; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.2s;
        }
        .btn-black:hover { 
            background: #333333; 
        }
        .btn-black:disabled { 
            background: #888888; 
            cursor: not-allowed; 
        }
        #resultArea { 
            margin-top: 20px; 
            text-align: left; 
            display: none; 
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        #canvasAnswer { 
            font-size: 18px; 
            font-weight: 800; 
            color: #000; 
            margin-bottom: 8px; 
            display: block; 
        }
        #canvasExplanation { 
            color: #495057;
            font-size: 14px;
            line-height: 1.5;
        }
        #loading { 
            display: none; 
            margin-top: 15px; 
            color: #6c757d; 
            font-size: 15px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button id="btnExecute" class="btn-black">Volver a Analizar</button>
    <div id="loading">Analizando pregunta en pantalla...</div>
    <div id="resultArea">
        <span id="canvasAnswer"></span>
        <div id="canvasExplanation"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
