<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Prueba - Formularios AI</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f8fafc; }
        .card { background: white; padding: 24px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .radio-group { display: flex; gap: 16px; }
        button[type="submit"] { background: #2563eb; color: white; padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button[type="submit"]:hover { background: #1d4ed8; }
        .warning { color: #dc2626; font-size: 0.85rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reporte del Alumno</h2>
        <p>Este es un formulario de prueba local para validar la extensión.</p>
        
        <form id="testForm" onsubmit="event.preventDefault(); alert('Formulario enviado (simulación)');">
            <div class="form-group">
                <label for="nombre">Nombre del alumno</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            
            <div class="form-group">
                <label for="curso">Curso</label>
                <input type="text" id="curso" name="curso" placeholder="Ej. 1ro Medio A">
            </div>
            
            <div class="form-group">
                <label for="desempeno">Desempeño académico</label>
                <textarea id="desempeno" name="desempeno" rows="3"></textarea>
            </div>
            
            <div class="form-group">
                <label>Requiere apoyo adicional</label>
                <div class="radio-group">
                    <label><input type="radio" name="apoyo" value="Sí"> Sí</label>
                    <label><input type="radio" name="apoyo" value="No"> No</label>
                </div>
            </div>

            <div class="form-group">
                <label for="participacion">Nivel de participación</label>
                <select id="participacion" name="participacion">
                    <option value="">Seleccione...</option>
                    <option value="Alta">Alta</option>
                    <option value="Media">Media</option>
                    <option value="Baja">Baja</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="comentarios">Comentarios finales</label>
                <textarea id="comentarios" name="comentarios" rows="3"></textarea>
            </div>
            
            <button type="submit">Enviar Reporte</button>
            <p class="warning">Recordatorio: La extensión AI nunca hará click en este botón.</p>
        </form>
    </div>
</body>
</html>
