name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx

    - name: Compile python files
      run: |
        python -m py_compile backend/app/main.py
        python -m py_compile backend/app/config.py
        python -m py_compile backend/app/database.py
        python -m py_compile backend/app/models.py
        python -m py_compile backend/app/schemas.py
        python -m py_compile backend/app/crud.py
        python -m py_compile backend/app/ai_agent.py
        python -m py_compile backend/app/form_analyzer.py
        python -m py_compile backend/app/seed_data.py
        python -m py_compile backend/app/utils.py
        
    - name: Run Pytest
      env:
        PYTHONPATH: backend
      run: |
        pytest backend/tests -v
